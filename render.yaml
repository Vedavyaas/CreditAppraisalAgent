services:
  # 1. Python ML Service (FastAPI)
  - type: web
    name: cam-ml-engine
    env: docker
    dockerfilePath: ./ml-service/Dockerfile
    rootDir: .
    region: ohio
    plan: free

  # 2. Java Backend & Frontend (Spring Boot serving Static Files)
  - type: web
    name: cam-java-backend
    env: docker
    dockerfilePath: ./Dockerfile
    rootDir: .
    region: ohio
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ML_SERVICE_URL
        fromService:
          name: cam-ml-engine
          type: web
          property: url
      - key: DB_URL
        fromDatabase:
          name: cam-postgres
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: cam-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cam-postgres
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: JPA_DDL_AUTO
        value: update
      - key: HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        value: kBrEkn/5ZoZJtAAxT5MLMtNcLz7yr+gsbTrWxmEezko3hRf2zuwkpTq1wvPeXkTu

databases:
  - name: cam-postgres
    region: ohio
    plan: free

