services:
  # 1. Python ML Service (FastAPI)
  - type: web
    name: cam-ml-engine
    env: docker
    dockerfilePath: ./ml-service/Dockerfile
    rootDir: .
    region: ohio
    plan: free

  # 2. Java Backend (Spring Boot with H2)
  - type: web
    name: cam-java-backend
    env: docker
    dockerfilePath: ./Dockerfile
    rootDir: .
    region: ohio
    plan: free
    envVars:
      - key: ML_SERVICE_URL
        fromService:
          name: cam-ml-engine
          type: web
          property: url

  # 3. React Frontend Dashboard (Static Site)
  - type: web
    name: cam-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    region: ohio
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: cam-java-backend
          type: web
          property: url
