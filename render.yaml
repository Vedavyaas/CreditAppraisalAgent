services:
  # 1. Python ML Service (FastAPI) - Internal Private Service
  - type: pserv
    name: cam-ml-engine
    env: docker
    dockerfilePath: Dockerfile
    rootDir: ./ml-service
    region: oregon
    plan: free

  # 2. Java Backend & Frontend (Spring Boot serving Static Files) - Exposes ONE URL
  - type: web
    name: cam-java-backend
    env: docker
    dockerfilePath: Dockerfile
    rootDir: .
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ML_SERVICE_URL
        value: http://cam-ml-engine:8000
      
      # Database Configuration (External Render Postgres config for deployment)
