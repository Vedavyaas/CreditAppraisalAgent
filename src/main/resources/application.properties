spring.application.name=CreditAppraisalMemo

# Database Configuration
# In Production (Render), set DB_URL, DB_USERNAME, and DB_PASSWORD environment variables.
# For Docker build on Render, ensure these are available if needed, or use H2 fallback.
spring.datasource.url=${DB_URL:jdbc:h2:mem:creditdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8090

spring.mail.host=smtp.gmail.com
