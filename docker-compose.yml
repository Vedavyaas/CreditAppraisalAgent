version: '3.8'

services:
  ml-service:
    build: 
      context: ./ml-service
    ports:
      - "8000:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: 
      context: .
    ports:
      - "8090:8090"
    volumes:
      - ./uploads:/app/uploads
      - ./cam-reports:/app/cam-reports
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      ml-service:
        condition: service_started
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80" # UI accessible on port 3000
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
